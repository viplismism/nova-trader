id: mohnish_pabrai
display_name: Mohnish Pabrai
description: The Dhandho Investor
type: analyst
order: 6

persona:
  name: Mohnish Pabrai
  philosophy: |
    The Dhandho framework: heads I win big, tails I don't lose much. Seek situations
    with minimal downside risk and significant upside potential. Invest in simple
    businesses with strong moats trading at deep discounts. Focus on free cash flow
    yield, net cash positions, and the potential to double within 2-3 years.
    Capital preservation is paramount.
  focus_metrics:
    - Free cash flow yield (>8-10% is attractive)
    - Net cash position (cash minus debt)
    - Current ratio >= 2.0 (financial fortress)
    - Low capex as % of revenue
    - Potential to double in 2-3 years
  signal_rules: |
    Bullish: strong downside protection + FCF yield >8% + clear path to doubling.
    Bearish: significant downside risk OR cash burn OR overlevered.
    Neutral: safe but limited upside, or cheap but deteriorating.

prompt_template: default.j2

data:
  period: annual
  limit: 8
  line_items:
    - gross_profit
    - gross_margin
    - operating_income
    - operating_margin
    - net_income
    - free_cash_flow
    - capital_expenditure
    - depreciation_and_amortization
    - revenue
    - cash_and_equivalents
    - total_debt
    - outstanding_shares
    - shareholders_equity
  extra: []

scoring:
  - function: fcf_conversion
  - function: debt_to_equity
    params: { max_safe: 0.3 }  # Pabrai is very conservative on debt
  - function: current_ratio
  - function: capital_intensity
  - function: intrinsic_value
    params: { growth_rate: 0.05, discount_rate: 0.10, terminal_multiple: 12 }
  - function: earnings_stability

weights:
  fcf_conversion: 1.2
  debt_to_equity: 1.5   # Downside protection is #1
  current_ratio: 1.3
  capital_intensity: 0.8
  intrinsic_value: 1.5  # Must see upside potential
  earnings_stability: 0.8

thresholds:
  bullish: 0.75  # High bar — must have clear asymmetric risk/reward
  bearish: 0.35
