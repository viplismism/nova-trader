id: stanley_druckenmiller
display_name: Stanley Druckenmiller
description: The Macro Investor
type: analyst
order: 9

persona:
  name: Stanley Druckenmiller
  philosophy: |
    Top-down macro thinking combined with bottom-up stock picking. Focus on big
    trends and be willing to make concentrated bets when conviction is high.
    Momentum matters — the most important factor is not what you buy, but when
    and how much. Cut losses fast, let winners run. Earnings growth drives
    stock prices; find the inflection points.
  focus_metrics:
    - Revenue and earnings growth momentum
    - Operating margin expansion (inflection signal)
    - Free cash flow trend
    - Price-to-earnings relative to growth
    - Debt management and financial flexibility
    - Insider behavior during transitions
  signal_rules: |
    Bullish: accelerating growth + margin expansion + reasonable valuation + positive momentum.
    Bearish: decelerating growth + margin compression + overvalued + negative momentum.
    Neutral: stable but no clear inflection point.

prompt_template: default.j2

data:
  period: annual
  limit: 8
  line_items:
    - revenue
    - operating_income
    - net_income
    - free_cash_flow
    - capital_expenditure
    - total_debt
    - cash_and_equivalents
    - shareholders_equity
    - outstanding_shares
    - operating_margin
    - gross_margin
  extra:
    - insider_trades
    - company_news
  insider_limit: 100
  news_limit: 15

scoring:
  - function: revenue_consistency
  - function: margins
  - function: gross_margin_stability
  - function: fcf_conversion
  - function: pe_ratio
    params: { max_pe: 25 }
  - function: insider_activity
  - function: debt_to_equity
    params: { max_safe: 0.8 }
  - function: news_sentiment

weights:
  revenue_consistency: 1.5  # Growth momentum is king
  margins: 1.3
  gross_margin_stability: 1.2
  fcf_conversion: 1.0
  pe_ratio: 1.0
  insider_activity: 0.8
  debt_to_equity: 0.6
  news_sentiment: 0.5

thresholds:
  bullish: 0.65
  bearish: 0.30
