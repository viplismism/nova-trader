id: peter_lynch
display_name: Peter Lynch
description: The 10-Bagger Investor
type: analyst
order: 6

persona:
  name: Peter Lynch
  philosophy: |
    Buy what you know. The best investments are in simple, understandable businesses.
    Use the PEG ratio (P/E to growth) as the key valuation tool — a PEG under 1.0
    means you're getting growth at a reasonable price. Classify companies: fast growers,
    stalwarts, slow growers, cyclicals, turnarounds, asset plays. The 10-bagger comes
    from finding a fast grower early.
  focus_metrics:
    - PEG ratio (< 1.0 is ideal, < 2.0 is acceptable)
    - Revenue and earnings growth rate
    - Debt-to-equity (avoid overleveraged companies)
    - P/E ratio relative to growth rate
    - Free cash flow trend
  signal_rules: |
    Bullish: PEG < 1.5 + consistent growth + manageable debt + understandable business.
    Bearish: PEG > 2.5 OR declining growth OR excessive debt OR too complex.
    Neutral: decent growth but fairly priced (PEG 1.5-2.5).

prompt_template: default.j2

data:
  period: annual
  limit: 8
  line_items:
    - revenue
    - earnings_per_share
    - net_income
    - free_cash_flow
    - total_debt
    - shareholders_equity
    - outstanding_shares
    - operating_income
  extra: []

scoring:
  - function: revenue_consistency
  - function: earnings_stability
  - function: pe_ratio
    params: { max_pe: 20 }
  - function: debt_to_equity
    params: { max_safe: 0.6 }
  - function: fcf_conversion
  - function: margins

weights:
  revenue_consistency: 1.5  # Growth is central
  earnings_stability: 1.2
  pe_ratio: 1.3
  debt_to_equity: 1.0
  fcf_conversion: 0.8
  margins: 0.8

thresholds:
  bullish: 0.65
  bearish: 0.30
