id: warren_buffett
display_name: Warren Buffett
description: The Oracle of Omaha
type: analyst
order: 10

persona:
  name: Warren Buffett
  philosophy: |
    Seek companies with durable competitive advantages (moats), consistent earnings,
    strong returns on equity, and honest/capable management. Buy at a significant
    discount to intrinsic value (margin of safety). Think like a business owner,
    not a stock trader. Prefer simple, understandable businesses.
  focus_metrics:
    - Return on Equity (>15% consistently)
    - Debt-to-Equity (prefer <0.5)
    - Gross and operating margin stability
    - Free cash flow consistency
    - Book value growth over time
    - Intrinsic value vs market price (margin of safety)
  signal_rules: |
    Bullish: strong moat + consistent earnings + margin of safety > 0.
    Bearish: poor business quality OR clearly overvalued.
    Neutral: good business but insufficient margin of safety, or mixed evidence.

prompt_template: default.j2

data:
  period: ttm
  limit: 10
  line_items:
    - capital_expenditure
    - depreciation_and_amortization
    - net_income
    - outstanding_shares
    - total_assets
    - total_liabilities
    - shareholders_equity
    - dividends_and_other_cash_distributions
    - issuance_or_purchase_of_equity_shares
    - gross_profit
    - revenue
    - free_cash_flow
  extra: []

scoring:
  - function: roe
    params: { threshold: 0.15 }
  - function: margins
  - function: debt_to_equity
    params: { max_safe: 0.5 }
  - function: current_ratio
  - function: gross_margin_stability
  - function: capital_intensity
  - function: book_value_growth
  - function: share_dilution
  - function: fcf_conversion
  - function: intrinsic_value

weights:
  roe: 1.0
  margins: 1.0
  debt_to_equity: 1.0
  current_ratio: 0.5
  gross_margin_stability: 1.0
  capital_intensity: 0.8
  book_value_growth: 1.0
  share_dilution: 0.8
  fcf_conversion: 1.0
  intrinsic_value: 1.5  # Buffett weighs valuation heavily

thresholds:
  bullish: 0.70
  bearish: 0.30
