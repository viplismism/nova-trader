name: Deploy

# Continuous Deployment: after the tests pass, build the image in Azure and roll it
# out. Branch -> environment mapping:
#   push to `staging` -> nova-staging-app  (test URL)
#   push to `main`    -> nova-demo-app     (prod / the demo URL)
# Auth is keyless via the OIDC federated credentials on the nova-trader-github-actions
# service principal (Contributor scoped to nova-demo-rg only).

on:
  push:
    branches: [main, staging]
  workflow_dispatch:        # manual "Run workflow" button (e.g. to apply a rotated secret)

permissions:
  id-token: write      # required for OIDC login to Azure
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install --upgrade pip
          pip install .
          pip install pytest
      - run: python -m pytest -q

  deploy:
    needs: test        # never deploy unless the suite is green
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select environment from branch
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "app=nova-demo-app"   >> "$GITHUB_OUTPUT"
            echo "runs_dir=/mnt/runs"  >> "$GITHUB_OUTPUT"   # prod has the Azure Files volume
          else
            echo "app=nova-staging-app" >> "$GITHUB_OUTPUT"
            echo "runs_dir="            >> "$GITHUB_OUTPUT"   # staging: ephemeral runs are fine
          fi

      - name: Azure login (OIDC, no stored password)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build + deploy
        env:
          APP: ${{ steps.env.outputs.app }}
          RUNS_DIR: ${{ steps.env.outputs.runs_dir }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOVA_ACCESS_PASSWORD: ${{ secrets.NOVA_ACCESS_PASSWORD }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          # Build the image in the cloud and create/update the app (preserves volumes/env).
          az containerapp up --name "$APP" --resource-group nova-demo-rg \
            --environment nova-demo-app-env --location eastus \
            --source . --target-port 8000 --ingress external
          # Keep secrets in sync with GitHub (GitHub is the source of truth for the key + password).
          az containerapp secret set -n "$APP" -g nova-demo-rg \
            --secrets anthropic-key="$ANTHROPIC_API_KEY" access-password="$NOVA_ACCESS_PASSWORD" -o none
          ENVVARS="ANTHROPIC_API_KEY=secretref:anthropic-key NOVA_ACCESS_PASSWORD=secretref:access-password"
          [ -n "$RUNS_DIR" ] && ENVVARS="$ENVVARS NOVA_RUNS_DIR=$RUNS_DIR"
          # Reddit creds are optional — only wire them in once they're set as GitHub secrets.
          if [ -n "$REDDIT_CLIENT_ID" ] && [ -n "$REDDIT_CLIENT_SECRET" ]; then
            az containerapp secret set -n "$APP" -g nova-demo-rg \
              --secrets reddit-client-id="$REDDIT_CLIENT_ID" reddit-client-secret="$REDDIT_CLIENT_SECRET" -o none
            ENVVARS="$ENVVARS REDDIT_CLIENT_ID=secretref:reddit-client-id REDDIT_CLIENT_SECRET=secretref:reddit-client-secret"
          fi
          az containerapp update -n "$APP" -g nova-demo-rg \
            --set-env-vars $ENVVARS --min-replicas 0 --max-replicas 1 -o none
          echo "Deployed $APP ->"
          az containerapp show -n "$APP" -g nova-demo-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv
