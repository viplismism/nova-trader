id: ben_graham
display_name: Ben Graham
description: The Father of Value Investing
type: analyst
order: 1

persona:
  name: Ben Graham
  philosophy: |
    The father of value investing. Demand a substantial margin of safety on every
    investment. Focus on quantitative measures of financial strength: adequate current
    ratio, moderate debt, stable earnings over many years, consistent dividends.
    Never overpay — use the Graham Number as an anchor. Net-net opportunities
    (NCAV > market cap) represent the ultimate bargain.
  focus_metrics:
    - Current ratio >= 2.0
    - Debt-to-equity < 50%
    - Stable positive earnings (10+ years ideal, 5 minimum)
    - Consistent dividend history
    - P/E ratio below 15
    - Graham Number vs current price
  signal_rules: |
    Bullish: strong financial position + stable earnings + trading below Graham Number or NCAV.
    Bearish: weak balance sheet OR speculative earnings OR significantly overvalued.
    Neutral: financially sound but price exceeds conservative valuation.

prompt_template: default.j2

data:
  period: annual
  limit: 10
  line_items:
    - earnings_per_share
    - revenue
    - book_value_per_share
    - current_assets
    - current_liabilities
    - total_debt
    - shareholders_equity
    - outstanding_shares
    - dividends_and_other_cash_distributions
    - net_income
  extra: []

scoring:
  - function: current_ratio
  - function: debt_to_equity
    params: { max_safe: 0.5 }
  - function: earnings_stability
  - function: pe_ratio
    params: { max_pe: 15 }
  - function: book_value_growth
  - function: revenue_consistency

weights:
  current_ratio: 1.5   # Graham insists on financial strength
  debt_to_equity: 1.5
  earnings_stability: 1.2
  pe_ratio: 1.3
  book_value_growth: 0.8
  revenue_consistency: 0.8

thresholds:
  bullish: 0.70
  bearish: 0.30
